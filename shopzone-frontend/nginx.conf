# ============================================================
# ShopZone Frontend — Nginx Configuration
# ============================================================
#
# This config does 3 things:
# 1. Serves the React static files (HTML, CSS, JS)
# 2. Proxies /api/ requests to the Spring Boot backend
# 3. Handles SPA routing (React Router) with try_files

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # Root directory where Vite build output lives
    root /usr/share/nginx/html;
    index index.html;

    # ==================== GZIP COMPRESSION ====================
    # Compress text-based responses to reduce bandwidth
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ==================== API PROXY ====================
    # Forward all /api/ requests to the Spring Boot backend
    # The backend service name in Docker Compose is "backend"
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # Timeout settings for long-running API calls
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Increase buffer size for large API responses (product lists, etc.)
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ==================== SWAGGER UI PROXY ====================
    # Forward Swagger requests to backend (for API testing)
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ==================== ACTUATOR PROXY ====================
    # Forward health check requests to backend
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ==================== STATIC FILE CACHING ====================
    # Cache JS, CSS, and images aggressively (Vite uses content hashes in filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==================== SPA ROUTING ====================
    # For all other routes, serve index.html and let React Router handle it
    # This is what makes /products, /cart, /admin/dashboard etc. work on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== SECURITY HEADERS ====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}