server:
  port: 8080    # Same port as monolith — frontend doesn't change

spring:
  application:
    name: api-gateway

  # Redis for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      # ═══════════════════════════════════════════════════════════
      # GLOBAL SETTINGS
      # ═══════════════════════════════════════════════════════════
      default-filters:
        # Add request ID to every request for tracing
        - name: RequestHeaderSize
          args:
            maxSize: 16KB

      # Enable service discovery for routes
      discovery:
        locator:
          enabled: false   # We define routes explicitly, not auto-discovered
          lower-case-service-id: true

      # Global CORS — replaces per-service CORS config
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Stripe-Signature
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600

      # ═══════════════════════════════════════════════════════════
      # ROUTE DEFINITIONS
      # ═══════════════════════════════════════════════════════════
      #
      # HOW ROUTING WORKS:
      # 1. Request comes to gateway on port 8080
      # 2. Gateway matches the URL path against these predicates
      # 3. First match wins — ORDER MATTERS (specific before general)
      # 4. Gateway looks up the service name in Eureka
      # 5. Eureka returns the host:port
      # 6. Gateway forwards the request
      #
      # The "lb://" prefix means "load balanced" — Eureka resolves it
      # ═══════════════════════════════════════════════════════════

      routes:
        # ─────────────────────────────────────────────────────────
        # USER SERVICE ROUTES (auth, users, addresses)
        # ─────────────────────────────────────────────────────────
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: user-service-addresses
          uri: lb://user-service
          predicates:
            - Path=/api/addresses/**

        - id: user-service-admin-users
          uri: lb://user-service
          predicates:
            - Path=/api/admin/users/**

        # Internal endpoint — NOT exposed through gateway
        # (services call each other directly via Eureka for internal APIs)

        # ─────────────────────────────────────────────────────────
        # PRODUCT SERVICE ROUTES (products, categories, admin)
        # ─────────────────────────────────────────────────────────
        - id: product-service-products
          uri: lb://product-service
          predicates:
            - Path=/api/products/**

        - id: product-service-categories
          uri: lb://product-service
          predicates:
            - Path=/api/categories/**

        - id: product-service-admin-products
          uri: lb://product-service
          predicates:
            - Path=/api/admin/products/**

        - id: product-service-admin-categories
          uri: lb://product-service
          predicates:
            - Path=/api/admin/categories/**

        - id: product-service-reviews
          uri: lb://product-service
          predicates:
            - Path=/api/reviews/**

        # ─────────────────────────────────────────────────────────
        # CART SERVICE ROUTES (cart, wishlist)
        # ─────────────────────────────────────────────────────────
        - id: cart-service-cart
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**

        - id: cart-service-wishlist
          uri: lb://cart-service
          predicates:
            - Path=/api/wishlist/**

        # ─────────────────────────────────────────────────────────
        # ORDER SERVICE ROUTES (orders, checkout, admin)
        # ─────────────────────────────────────────────────────────
        - id: order-service-orders
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: order-service-checkout
          uri: lb://order-service
          predicates:
            - Path=/api/checkout/**

        - id: order-service-admin-orders
          uri: lb://order-service
          predicates:
            - Path=/api/admin/orders/**

        - id: order-service-admin-dashboard
          uri: lb://order-service
          predicates:
            - Path=/api/admin/dashboard/**

        - id: order-service-admin-reports
          uri: lb://order-service
          predicates:
            - Path=/api/admin/reports/**

        # ─────────────────────────────────────────────────────────
        # PAYMENT SERVICE ROUTES (payments, webhooks)
        # ─────────────────────────────────────────────────────────
        - id: payment-service-payments
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: payment-service-webhooks
          uri: lb://payment-service
          predicates:
            - Path=/api/webhooks/**

        - id: payment-service-admin-payments
          uri: lb://payment-service
          predicates:
            - Path=/api/admin/payments/**

        # ─────────────────────────────────────────────────────────
        # SEARCH SERVICE ROUTES
        # ─────────────────────────────────────────────────────────
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**

        # ─────────────────────────────────────────────────────────
        # SWAGGER UI — per-service (useful for development)
        # ─────────────────────────────────────────────────────────
        - id: user-service-swagger
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**

        - id: product-service-swagger
          uri: lb://product-service
          predicates:
            - Path=/product-service/v3/api-docs/**

        - id: order-service-swagger
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs/**

        - id: payment-service-swagger
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs/**

# ═══════════════════════════════════════════════════════════════════
# EUREKA CLIENT CONFIG
# ═══════════════════════════════════════════════════════════════════
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:password@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ═══════════════════════════════════════════════════════════════════
# JWT CONFIG (gateway validates tokens, extracts user info)
# ═══════════════════════════════════════════════════════════════════
jwt:
  secret: ${JWT_SECRET:c2hvcHpvbmUtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24td2hpY2gtc2hvdWxkLWJlLWxvbmctZW5vdWdoLTI1Ni1iaXRz}

# ═══════════════════════════════════════════════════════════════════
# RATE LIMITING CONFIG
# ═══════════════════════════════════════════════════════════════════
rate-limit:
  # Requests per second for authenticated users
  authenticated:
    replenish-rate: 20
    burst-capacity: 40
  # Requests per second for anonymous users
  anonymous:
    replenish-rate: 10
    burst-capacity: 20

# ═══════════════════════════════════════════════════════════════════
# ACTUATOR
# ═══════════════════════════════════════════════════════════════════
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ═══════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.shopzone.apigateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"