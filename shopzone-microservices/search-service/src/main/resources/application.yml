server:
  port: 8087

spring:
  application:
    name: search-service
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.shopzone.common.event

jwt:
  secret: c2hvcHpvbmUtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24td2hpY2gtc2hvdWxkLWJlLWxvbmctZW5vdWdoLTI1Ni1iaXRz

# Inter-service URLs (now using Eureka service names)
services:
  product-url: http://product-service

# ═══ NEW: Eureka Service Discovery ═══
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:password@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}



logging:
  level:
    com.shopzone.searchservice: DEBUG