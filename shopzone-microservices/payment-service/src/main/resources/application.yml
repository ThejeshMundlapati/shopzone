server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/shopzone_payments
    username: shopzone_admin
    password: shopzone_secret_2024
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: c2hvcHpvbmUtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24td2hpY2gtc2hvdWxkLWJlLWxvbmctZW5vdWdoLTI1Ni1iaXRz

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  public-key: ${STRIPE_PUBLIC_KEY:pk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  currency: usd

# Inter-service URLs (now using Eureka service names)
services:
  order-url: http://order-service
  notification-url: http://notification-service

payment:
  max-refund-days: 30

# ═══ NEW: Eureka Service Discovery ═══
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:password@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}

logging:
  level:
    com.shopzone.paymentservice: DEBUG