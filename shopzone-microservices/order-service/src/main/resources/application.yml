server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/shopzone_orders
    username: shopzone_admin
    password: shopzone_secret_2024
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.shopzone.common.event

jwt:
  secret: c2hvcHpvbmUtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24td2hpY2gtc2hvdWxkLWJlLWxvbmctZW5vdWdoLTI1Ni1iaXRz

# Inter-service URLs (now using Eureka service names)
services:
  user-url: http://user-service
  product-url: http://product-service
  cart-url: http://cart-service
  payment-url: http://payment-service
  notification-url: http://notification-service

shopzone:
  order:
    tax-rate: 0.08
    free-shipping-threshold: 50.00
    flat-shipping-rate: 5.99
    cancellation-window-hours: 24
    low-stock-threshold: 10

# ═══ NEW: Eureka Service Discovery ═══
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:password@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}



logging:
  level:
    com.shopzone.orderservice: DEBUG