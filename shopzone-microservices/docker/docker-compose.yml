# ============================================================
# ShopZone Microservices — Docker Compose
#
# Usage:
#   cd docker
#   docker compose up -d                    # Start databases only
#   docker compose --profile infra up -d    # Start databases + Eureka + Gateway
#   docker compose --profile kafka up -d    # Start databases + Kafka
#   docker compose --profile full up -d     # Start everything
# ============================================================

services:

  # ==================== DATABASES ====================

  postgres:
    image: postgres:15-alpine
    container_name: shopzone-postgres
    environment:
      POSTGRES_USER: shopzone_admin
      POSTGRES_PASSWORD: shopzone_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopzone_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: shopzone-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shopzone-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ==================== KAFKA (NEW — Week 17-18) ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopzone-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - shopzone-network
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopzone-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ==================== SERVICE DISCOVERY (Week 16) ====================

  discovery-server:
    build:
      context: ../discovery-server
      dockerfile: Dockerfile
    image: shopzone/discovery-server:latest
    container_name: shopzone-discovery-server
    profiles:
      - infra
      - full
    ports:
      - "8761:8761"
    environment:
      - EUREKA_PASSWORD=password
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://eureka:password@localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== API GATEWAY (Week 16) ====================

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: shopzone/api-gateway:latest
    container_name: shopzone-api-gateway
    profiles:
      - infra
      - full
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URI=http://eureka:password@discovery-server:8761/eureka/
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024}
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  es_data:
  zookeeper_data:   # NEW
  kafka_data:       # NEW

networks:
  shopzone-network:
    driver: bridge
