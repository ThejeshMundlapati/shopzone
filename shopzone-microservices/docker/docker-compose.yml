# ============================================================
# ShopZone Microservices — Docker Compose
#
# Usage:
#   cd docker
#   docker compose up -d                    # Start databases only
#   docker compose --profile infra up -d    # Start databases + Eureka + Gateway
# ============================================================

services:

  # ==================== DATABASES ====================

  postgres:
    image: postgres:15-alpine
    container_name: shopzone-postgres
    environment:
      POSTGRES_USER: shopzone_admin
      POSTGRES_PASSWORD: shopzone_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopzone_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: shopzone-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shopzone-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ==================== SERVICE DISCOVERY (NEW — Week 16) ====================

  # Eureka Server — services register here and discover each other by name
  # Dashboard: http://localhost:8761 (login: eureka / password)
  #
  # Profile "infra" means this only starts when you explicitly ask for it:
  #   docker compose --profile infra up -d
  # Without --profile infra, only databases start (same as before).
  discovery-server:
    build:
      context: ../discovery-server
      dockerfile: Dockerfile
    image: shopzone/discovery-server:latest
    container_name: shopzone-discovery-server
    profiles:
      - infra
      - full
    ports:
      - "8761:8761"
    environment:
      - EUREKA_PASSWORD=password
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://eureka:password@localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== API GATEWAY (NEW — Week 16) ====================

  # Single entry point for all client requests — port 8080
  # Routes requests to the correct service via Eureka lookup
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: shopzone/api-gateway:latest
    container_name: shopzone-api-gateway
    profiles:
      - infra
      - full
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URI=http://eureka:password@discovery-server:8761/eureka/
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024}
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  es_data:

networks:
  shopzone-network:
    driver: bridge