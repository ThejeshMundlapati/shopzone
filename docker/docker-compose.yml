# ============================================================
# ShopZone — Full Stack Docker Compose
#
# This replaces your existing docker-compose.yml.
# It keeps all your existing database services AND adds
# the backend + frontend application services.
#
# Usage:
#   cd docker
#   docker compose up -d              # Start everything
#   docker compose up -d --build      # Rebuild images and start
#   docker compose logs -f backend    # Follow backend logs
#   docker compose down               # Stop everything
# ============================================================

services:

  # ==================== DATABASES ====================

  # PostgreSQL — Users, Orders, Reviews, Payments
  postgres:
    image: postgres:15-alpine
    container_name: shopzone-postgres
    environment:
      POSTGRES_DB: shopzone
      POSTGRES_USER: shopzone_admin
      POSTGRES_PASSWORD: shopzone_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopzone_admin -d shopzone"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB — Products, Categories
  mongodb:
    image: mongo:7.0
    container_name: shopzone-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — Cart, Wishlist, Sessions
  redis:
    image: redis:7-alpine
    container_name: shopzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shopzone-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch — Product Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shopzone-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shopzone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # Redis Commander — Redis GUI (optional, for debugging)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: shopzone-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - shopzone-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - debug

  # ==================== APPLICATION ====================

  # Spring Boot Backend
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: shopzone-backend
    ports:
      - "8080:8080"
    environment:
      # Activate the docker Spring profile
      SPRING_PROFILES_ACTIVE: docker

      # Database URLs (override localhost → container names)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shopzone
      SPRING_DATASOURCE_USERNAME: shopzone_admin
      SPRING_DATASOURCE_PASSWORD: shopzone_secret_2024
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/shopzone_products
      SPRING_DATA_REDIS_HOST: redis
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

      # Stripe (loaded from .env file)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}

      # Cloudinary (loaded from .env file)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your_cloud_name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your_api_key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your_api_secret}

      # Email / Mailtrap (loaded from .env file)
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-your_mailtrap_username}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your_mailtrap_password}
      MAIL_FROM: ${MAIL_FROM:-noreply@shopzone.com}

      # Frontend URL for email links
      APP_BASE_URL: http://localhost:3000

      # JVM memory settings for container
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - shopzone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5

  # React Frontend (served by Nginx)
  frontend:
    build:
      context: ../shopzone-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
    container_name: shopzone-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopzone-network
    restart: unless-stopped

# ==================== VOLUMES ====================
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  es_data:

# ==================== NETWORK ====================
networks:
  shopzone-network:
    driver: bridge