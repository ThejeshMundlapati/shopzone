# ============================================================
# ShopZone — Dependabot Configuration
#
# Automatically creates PRs when dependencies have updates.
# Great for security patches and keeping deps current.
# Shows employers you follow professional maintenance practices.
# ============================================================

version: 2
updates:
  # Maven (backend) dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # npm (frontend) dependencies
  - package-ecosystem: "npm"
    directory: "/shopzone-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/shopzone-frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"